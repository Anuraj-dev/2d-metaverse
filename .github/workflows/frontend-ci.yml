name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml", "docker-compose.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml", "docker-compose.yml"]

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          VITE_GIT_SHA: ${{ github.sha }}
      - name: Bundle budget
        run: npm run size
      - name: Assert prod bundle has no E2E hook
        run: |
          if grep -rl "__testHook" dist; then
            echo "E2E test hook leaked into the production bundle" >&2
            exit 1
          fi

  e2e:
    name: E2E (Playwright vs composed stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Boot composed backend stack
        run: docker compose up -d --build
        env:
          GIT_SHA: ${{ github.sha }}
          CORS_ORIGINS: http://localhost:4173
      - name: Wait for backend readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:3001/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "backend never became ready" >&2
          docker compose logs --no-color
          exit 1
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Build frontend with E2E hook
        run: npm run build
        working-directory: frontend
        env:
          VITE_E2E_HOOK: "1"
          VITE_USE_MOCK: "0"
          VITE_SERVER_URL: http://localhost:3001
          VITE_GIT_SHA: ${{ github.sha }}
      - name: Run Playwright suite
        run: npm run e2e
        working-directory: frontend
      - name: Upload traces and screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy to Vercel (production)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy to Vercel
        run: >-
          npx --yes vercel@latest deploy --prod --yes
          --token="$VERCEL_TOKEN"
          --build-env VITE_GIT_SHA="$GITHUB_SHA"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
