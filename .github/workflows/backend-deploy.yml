name: Backend deploy

on:
  workflow_run:
    workflows: ["Backend CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      PROD_HEALTH_URL: ${{ vars.PROD_HEALTH_URL }}
      SSM_ENV_PARAMETER: ${{ vars.SSM_ENV_PARAMETER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: metaverse-${{ github.run_id }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push immutable image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$RELEASE_SHA"
          docker buildx build \
            --platform linux/amd64 \
            --build-arg GIT_SHA="$RELEASE_SHA" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag "$IMAGE" \
            --push backend
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push watchdog image
        id: alerter-image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:alerter-$RELEASE_SHA"
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag "$IMAGE" \
            --push deploy/alerter
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy through Systems Manager
        id: deploy
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          ALERTER_IMAGE_URI: ${{ steps.alerter-image.outputs.uri }}
        run: |
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.prod.yml)
          SCRIPT_B64=$(base64 -w0 deploy/deploy-remote.sh)
          jq -n \
            --arg compose "$COMPOSE_B64" \
            --arg script "$SCRIPT_B64" \
            --arg image "$IMAGE_URI" \
            --arg alerterImage "$ALERTER_IMAGE_URI" \
            --arg region "$AWS_REGION" \
            --arg parameter "${SSM_ENV_PARAMETER:-/metaverse/prod/env}" \
            '{commands: [
              "set -e",
              "mkdir -p /opt/metaverse",
              ("echo " + $compose + " | base64 -d > /opt/metaverse/docker-compose.prod.yml"),
              ("echo " + $script + " | base64 -d > /opt/metaverse/deploy-remote.sh"),
              "chmod 700 /opt/metaverse/deploy-remote.sh",
              ("/opt/metaverse/deploy-remote.sh " + $image + " " + $region + " " + $parameter + " " + $alerterImage)
            ]}' > ssm-commands.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Metaverse backend $GITHUB_SHA" \
            --parameters file://ssm-commands.json \
            --timeout-seconds 1200 \
            --query Command.CommandId \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")
          echo "$INVOCATION" | jq '{Status,Output:.StandardOutputContent,Error:.StandardErrorContent}'
          STATUS=$(echo "$INVOCATION" | jq -r '.Status')
          if [[ "$STATUS" != "Success" ]]; then
            echo "Remote deploy script did not succeed (status: $STATUS)" >&2
            exit 1
          fi

      - name: Verify public endpoint
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error "$PROD_HEALTH_URL" | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 5
          done
          echo "Production health check failed" >&2
          exit 1
