name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "docker-compose*.yml"
      - ".github/workflows/backend-*.yml"
  pull_request:
    paths:
      - "backend/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "docker-compose*.yml"
      - ".github/workflows/backend-*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test shared + backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      # Shared contract package: lint, typecheck, schema-fixture tests.
      - name: Lint shared
        run: npm run lint --workspace @metaverse/shared
      - name: Typecheck shared
        run: npm run typecheck --workspace @metaverse/shared
      - name: Test shared
        run: npm run test --workspace @metaverse/shared
      # Backend.
      - name: Lint backend
        run: npm run lint --workspace metaverse-backend
      - name: Typecheck backend
        run: npm run typecheck --workspace metaverse-backend
      - name: Test backend
        run: npm run test --workspace metaverse-backend
      - name: Build backend
        run: npm run build --workspace metaverse-backend
      - name: Audit
        run: npm audit --audit-level=moderate

  scripts:
    name: Shellcheck & alerter tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck deploy scripts
        run: shellcheck deploy/*.sh deploy/aws/*.sh deploy/test/*.sh
      - name: Alerter unit tests
        working-directory: deploy/alerter
        run: node --test
      - name: Deploy script gate harness (stubbed docker/aws/curl)
        run: bash deploy/test/deploy-gate.test.sh

  integration:
    name: Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces (smoke-test + integration client)
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Validate Compose files
        env:
          TURN_DOMAIN: turn.example.com
          LIVEKIT_API_KEY: ci-key
          LIVEKIT_API_SECRET: ci-livekit-secret-at-least-thirty-two-characters
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.aws.yml config --quiet
          BACKEND_IMAGE=example.invalid/metaverse:ci docker compose --env-file .env.example -f deploy/docker-compose.prod.yml config --quiet
      - name: Start backend stack
        run: docker compose up -d --build
      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:3001/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1
      - name: Run integration test suite
        working-directory: backend
        env:
          DATABASE_URL: postgres://metaverse:metaverse@localhost:5432/metaverse
          # Logical DB 1 keeps test game state away from the composed backend on DB 0.
          REDIS_URL: redis://localhost:6379/1
        run: npm run test:integration
      - name: Run contract smoke test
        working-directory: backend
        run: npm run smoke
      - name: Deploy gate detects a failing setup container
        run: |
          # Prove the deploy gate's premise: a non-zero setup container exit is
          # observable as a non-zero exit code (not swallowed). The deploy
          # script relies on exactly this to abort before switching the image.
          if docker compose run --rm --entrypoint sh setup -c "exit 1"; then
            echo "gate failed to detect failure: setup exited 0 when it should have failed"
            exit 1
          fi
          echo "deploy gate correctly observed the non-zero setup exit"
      - name: Container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop backend stack
        if: always()
        run: docker compose down -v --remove-orphans

  image:
    name: Build production image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          # Root context so the image can build the @metaverse/shared workspace.
          context: .
          file: backend/Dockerfile
          push: false
          tags: metaverse-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
