x-backend-environment: &backend-environment
  NODE_ENV: production
  PORT: 3001
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_SECRET: ${JWT_SECRET}
  JWT_TTL: ${JWT_TTL:-7d}
  CORS_ORIGINS: ${CORS_ORIGINS}
  LIVEKIT_URL: ${LIVEKIT_URL}
  LIVEKIT_API_URL: ${LIVEKIT_API_URL:-http://livekit:7880}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
  ROOM_1_KEY: ${ROOM_1_KEY}
  ROOM_2_KEY: ${ROOM_2_KEY}
  ROOM_3_KEY: ${ROOM_3_KEY}
  ROOM_4_KEY: ${ROOM_4_KEY}
  ROOM_5_KEY: ${ROOM_5_KEY}
  ROOM_6_KEY: ${ROOM_6_KEY}
  STAGE_KEY: ${STAGE_KEY}
  MAP_JSON_URL: ${MAP_JSON_URL:-/assets/maps/space.json}
  TRUST_PROXY: "true"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  livekit:
    image: livekit/livekit-server:v1.9.1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        redis:
          address: redis:6379
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        turn:
          enabled: true
          domain: ${TURN_DOMAIN}
          udp_port: 3478
          tls_port: 5349
          cert_file: /etc/letsencrypt/live/${TURN_DOMAIN}/fullchain.pem
          key_file: /etc/letsencrypt/live/${TURN_DOMAIN}/privkey.pem
        keys:
          "${LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET}"
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "50000-50100:50000-50100/udp"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    expose:
      - "7880"

  setup:
    image: ${BACKEND_IMAGE}
    restart: "no"
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "node dist/migrate.js && node dist/seed.js"]

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 4s
      retries: 12

  alerter:
    image: ${ALERTER_IMAGE:-metaverse-alerter:local}
    build: ./alerter
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres-data:
  redis-data:
